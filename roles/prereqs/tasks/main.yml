---
- name: Garantir pacotes base no Fedora 44
  ansible.builtin.dnf:
    name:
      - curl
      - git
      - jq
      - tar
      - python3
      - python3-pip
      - python3-kubernetes     # necessário para o módulo kubernetes.core.k8s
    state: present

- name: Ajustar vm.max_map_count para o Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    sysctl_file: /etc/sysctl.d/99-elasticsearch.conf
    state: present
    reload: true

- name: Parar e desabilitar o firewalld (recomendação do k3s para lab)
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  when: disable_firewalld | bool
  failed_when: false
